<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        .wrapper {
        display: flex;
        justify-content: center; /* 水平置中 */
        align-items: center;     /* 垂直置中 */
  
        min-height: 100vh;       /* 讓容器高度等於視窗高度，垂直置中才有用 */
         background-color: #f0f0f0; /* 選用，方便觀察 */
        }
        .card{
                
                width: 500px;
                background-color: rgb(248, 245, 239);
                border:2px solid rgb(163, 161, 161);
                display:inline-block;
                position:relative;/*相對定位*/
                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                border-radius: 4px;  }

        .card-img{
            width:100%;
            height:100%;
            object-fit:cover;}

        .card-title{   
        font-size:36px;
        color:rgb(82, 82, 82);
        text-align:center;
        

        }

        .card-content{
            font-size:18px;
            color:rgb(82, 82, 82)

        }
        .hot-badge {
        position: absolute;  /* 絕對定位 */
        top: 10px;           /* 距離上方 10px */
        right: 10px;         /* 距離右方 10px */

        background-color: #ff4d4d; 
        color: white;              /* 文字白色 */
        padding: 20px 20px;         /* 內距 */
        font-size: 15px;           /* 字體大小 */
        font-weight: bold;         /* 粗體 */
        border-radius: 4px;  }      /* 圓角 */
                      



        
    </style>
</head>
<body>
    <div class="wrapper">
    
        <div class="card">
    <div class="card-img">
         
      <img src="https://picsum.photos/500/300/?random=10" />
    </div>
    <div class="hot-badge">HOT</div> 
    <h1 class="card-title">卡片標題</h1>
    <div class="card-content">
        
      這是卡片的內容這是卡片的內容這是卡片的內容這是卡片的內容這是卡片的內容這是卡片的內容
    </div>
    
    </div>
  </div>
  </div>
</body>
</html>
